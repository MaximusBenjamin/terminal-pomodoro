name: tpom
options:
  bundleIdPrefix: com.maximus
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  tpom:
    type: application
    platform: iOS
    sources:
      - tpom
      - Shared
    dependencies:
      - package: Supabase
      - target: tpomWidgets
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_CFBundleDisplayName: tpom
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        CODE_SIGN_ENTITLEMENTS: tpom/tpom.entitlements
  tpomWidgets:
    type: app-extension
    platform: iOS
    sources:
      - tpomWidgets
      - Shared
    info:
      path: tpomWidgets/Info.plist
      properties:
        CFBundleDisplayName: tpom Widgets
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maximus.tpom.Widgets
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: tpomWidgets/tpomWidgets.entitlements
